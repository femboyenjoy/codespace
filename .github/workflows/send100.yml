# .github/workflows/trigger_smtpsender.yml
name: Trigger smtpsender 100 times

on:
  workflow_dispatch:   # 手动触发，也可改为 push 等事件

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trigger smtpsender workflow 100 times
        env:
          GH_TOKEN: ${{ secrets.PAT }}   # 仓库自带的 PAT，需具备 actions:write 权限
        run: |
          for i in $(seq 1 100); do
            echo "Triggering run #$i"
            gh workflow run smtpsender.yml --ref main
          done
