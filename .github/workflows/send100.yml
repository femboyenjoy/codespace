name: Trigger smtpsender 100 times

on:
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    # 显式赋予 GITHUB_TOKEN 写入 Actions 的权限
    permissions:
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Trigger smtpsender 100 times
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for i in $(seq 1 100); do
            echo "Triggering run #$i"
            gh workflow run smtpsender.yml --ref main
          done
